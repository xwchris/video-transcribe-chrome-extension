<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Videosays Options</title>
    <script type="module" src="./main.ts"></script>
  </head>
  <body>
    <main class="shell options">
      <header>
        <div>
          <p class="eyebrow">Videosays</p>
          <h1>Extension settings</h1>
        </div>
      </header>
      <section class="panel">
        <label for="api-key">API key</label>
        <input id="api-key" type="password" autocomplete="off" placeholder="vs_xxxxx" />
        <button id="save-key" type="button">Save key</button>
        <p id="message" class="message"></p>
      </section>
      <section class="panel text">
        <h2>Privacy</h2>
        <p>The extension sends only the video link you submit, your API request, and task metadata to Videosays. It does not read page content in the background.</p>
        <a href="https://videosays.com/dashboard/developer" target="_blank" rel="noreferrer">Get API key</a>
        <a href="https://videosays.com/docs" target="_blank" rel="noreferrer">API docs</a>
      </section>
    </main>
  </body>
</html>
